<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Admin Account · ReviewTracker</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617 55%);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 18px;
      padding: 24px 24px 26px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.4);
      backdrop-filter: blur(16px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .brand-badge {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 0, #38bdf8, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #e5e7eb;
    }
    .brand-title { font-weight: 600; }
    .brand-subtitle {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 2px;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 4px;
    }
    p.subtitle {
      margin: 0 0 16px;
      font-size: 13px;
      color: #9ca3af;
    }
    .field { margin-bottom: 12px; }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #cbd5f5;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #f9fafb;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.7);
    }
    .error {
      margin-top: 4px;
      margin-bottom: 8px;
      font-size: 13px;
      color: #fca5a5;
    }
    button {
      width: 100%;
      margin-top: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(90deg, #4f46e5, #2563eb);
      color: #f9fafb;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover {
      background: linear-gradient(90deg, #4338ca, #1d4ed8);
    }
    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }
    a {
      color: #60a5fa;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-badge">R</div>
      <div>
        <div class="brand-title">ReviewTracker</div>
        <div class="brand-subtitle">Create your admin account</div>
      </div>
    </div>

    <h1>Sign up</h1>
    <p class="subtitle">Choose a username and password to access the dashboard.</p>

    <form method="POST" action="/signup">
      <div class="field">
        <label for="email">Email (optional but recommended)</label>
        <input id="email" name="email" type="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>
      </div>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <button type="submit">Create account</button>

      <div class="hint">
        Already have an account?
        <a href="/login">Log in</a>
      </div>
    </form>
  </div>
</body>
</html>
