<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tell us more · ReviewTracker</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617 55%);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      text-align: center;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(15, 23, 42, 0.95);
      border-radius: 20px;
      padding: 22px 22px 24px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(148, 163, 184, 0.4);
      backdrop-filter: blur(16px);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9ca3af;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 6px;
    }
    p {
      margin: 0 0 16px;
      font-size: 14px;
      color: #9ca3af;
    }
    textarea {
      width: 100%;
      min-height: 130px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #f9fafb;
      font-size: 14px;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.7);
    }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #4f46e5, #2563eb);
      color: #f9fafb;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="pill">
      <span>Private feedback</span>
      {% if rating == "ok" %}<span>OK</span>{% elif rating == "bad" %}<span>Bad</span>{% endif %}
    </div>
    <h1>Tell us what we can improve</h1>
    <p>Your comments come straight to our team. They will not be posted publicly.</p>

    <form action="/submit_internal_feedback" method="POST">
      <input type="hidden" name="employee_id" value="{{ employee_id }}">
      <input type="hidden" name="rating" value="{{ rating }}">
      <textarea name="comment" placeholder="What worked, what didn’t, or anything specific we should know…"></textarea>
      <button type="submit">Send feedback privately</button>
    </form>
  </div>
</body>
</html>
