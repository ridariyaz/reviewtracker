<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f0f6ff;
margin:0;
}

.header{
background:#0d6efd;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.container{
width:90%;
max-width:900px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
color:#0d6efd;
}

input{
padding:12px;
width:70%;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:12px 20px;
background:#0d6efd;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0b5ed7;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
}

th, td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#e7f1ff;
}

img{
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">
Employee Review Dashboard
</div>

<div class="container">

<h2>Add Employee</h2>

<form action="/add_employee" method="POST">
<input type="text" name="name" placeholder="Employee name">
<button type="submit">Add</button>
</form>

<h2>Employees</h2>

<table>

<tr>
<th>Name</th>
<th>Scans</th>
<th>QR Code</th>
</tr>

{% for employee in employees %}

<tr>
<td>{{ employee[1] }}</td>
<td>{{ employee[2] }}</td>
<td>
<img src="/static/qrcodes/{{ employee[0] }}.png" width="80">
</td>
</tr>

{% endfor %}

</table>

</div>

</body>

</html>
